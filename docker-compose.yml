services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMoveGLMS.Api/Dockerfile
    container_name: glms-backend-api
    depends_on:
      sql-server-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=TechMoveGLMSDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"
      ApiSettings__ApiKey: "TechMove-Part3-Demo-Key"
    ports:
      - "5001:8080"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMoveGLMS/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ApiSettings__BaseUrl: "http://glms-backend-api:8080/"
      ApiSettings__ApiKey: "TechMove-Part3-Demo-Key"
    ports:
      - "5000:8080"
    volumes:
      - web_uploads:/app/wwwroot/uploads
    networks:
      - glms-network

networks:
  glms-network:

volumes:
  sql_data:
  web_uploads: